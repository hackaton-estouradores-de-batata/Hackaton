services:
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: hackaton-api
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: sqlite:////workspace/data/app.db
      CASE_STORAGE_DIR: /workspace/data/processos_exemplo
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      POLICY_PATH: /workspace/policy/acordos_v1.yaml
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src/api:/app
      - ./data:/workspace/data
      - ./policy:/workspace/policy
      - ./arquivos_adicionais:/workspace/arquivos_adicionais:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: hackaton-web
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
