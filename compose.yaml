services:
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: hackaton-api
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/app.db}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src/api/app:/app/app
      - ./src/api/data:/app/data
      - ./arquivos_adicionais:/app/arquivos_adicionais:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: hackaton-web
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped
