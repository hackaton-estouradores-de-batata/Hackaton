services:
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: hackaton-api
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:-sqlite:////workspace/data/app.db}
      CASE_STORAGE_DIR: ${CASE_STORAGE_DIR:-/workspace/data/processos_cadastrados}
      POLICY_PATH: ${POLICY_PATH:-/workspace/src/policy/acordos_v1.yaml}
    ports:
      - "${API_BIND:-127.0.0.1}:${API_PORT:-8000}:8000"
    volumes:
      - ./data:/workspace/data
      - ./src/policy:/workspace/src/policy
      - ./arquivos_adicionais:/workspace/arquivos_adicionais:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
      target: runner
    container_name: hackaton-web
    env_file:
      - .env
    environment:
      API_INTERNAL_URL: http://api:8000
      NODE_ENV: production
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
