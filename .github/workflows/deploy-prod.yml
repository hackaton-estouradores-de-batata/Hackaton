name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on Linux server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ secrets.DEPLOY_DIR }}"
            BRANCH="${{ github.ref_name }}"
            REPO_SSH="git@github.com:${{ github.repository }}.git"

            if [ -z "$DEPLOY_DIR" ]; then
              echo "DEPLOY_DIR secret is empty"
              exit 1
            fi

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              mkdir -p "$DEPLOY_DIR"
              git clone "$REPO_SSH" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch --all --prune
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            if [ ! -f .env ]; then
              cp .env.example .env
              echo ".env not configured on server. Fill it and re-run workflow."
              exit 1
            fi

            docker compose -f compose.prod.yaml up -d --build --remove-orphans
            docker image prune -f
